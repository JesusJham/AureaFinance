<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurea Finance Group</title>

    <link rel="stylesheet" href="../assets/css/style-dashboard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
<div class="container">
    <aside class="sidebar">
        <div>
            <img src="../assets/images/logo.png" class="sidebar-logo" />

            <nav>
                <a class="active" href="carga.html">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Carga</span>
                </a>

                <a href="carga-nueva.html">
                    <i class="fa-solid fa-square-plus"></i>
                    <span>Carga Nueva</span>
                </a>

                <a href="configurar.html">
                    <i class="fa-solid fa-server"></i>
                    <span>Configurar Servidor</span>
                </a>
            </nav>
        </div>

        <button class="logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Cerrar sesión</span>
        </button>
    </aside>

    <main class="content">
        <h1>Carga</h1>
        <p>Selecciona una configuración registrada y carga un archivo.</p>

        <div class="filters">
            <div>
                <label>SERVIDOR</label>
                <select id="loadServidor" onchange="onLoadServidorChange()">
                    <option value="">Seleccione servidor</option>
                </select>
            </div>

            <div>
                <label>BASE DE DATOS</label>
                <select id="loadBaseDatos">
                    <option value="">Seleccione BD</option>
                </select>
            </div>

            <div>
                <label>ESQUEMA</label>
                <select id="loadEsquema" onchange="onLoadEsquemaChange()">
                    <option value="">Seleccione esquema</option>
                </select>
            </div>

            <div>
                <label>TABLA REGISTRADA</label>
                <select id="loadDataEntry">
                    <option value="">Seleccione tabla</option>
                </select>
            </div>
        </div>

        <div class="upload-box">
            <i class="fa-solid fa-cloud-arrow-up"></i>

            <h2>Carga tu archivo</h2>

            <p>Arrastra y suelta tu archivo aquí o selecciona desde tu dispositivo.</p>

            <button class="btn-primary" onclick="selectFileCarga()">
                Seleccionar Archivo
            </button>

            <input
                type="file"
                id="fileInputCarga"
                hidden
                accept=".csv,.xlsx,.txt"
                onchange="handleFileCarga(event)"
            />

            <span id="fileNameCarga">Formatos permitidos: CSV, XLSX, TXT</span>
        </div>

        <div class="actions-footer">
            <button class="btn-outline-dark" onclick="window.location.href='carga-nueva.html'">
                Nueva Configuración
            </button>

            <div class="right-buttons">
                <button class="btn-outline" onclick="validarArchivoCarga()">
                    Validar Archivo
                </button>

                <button class="btn-primary" onclick="ejecutarCargaRegistrada()">
                    Cargar Archivo
                </button>
            </div>
        </div>
    </main>
</div>

<script src="../assets/js/app.js"></script>
</body>
</html>
